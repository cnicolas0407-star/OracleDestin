<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Oracle du Destin</title>

  <style>
    body {
      background: #0f0f1a;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      font-family: monospace;
    }

    .container {
      text-align: center;
    }

    #texte {
      font-size: 28px;
      margin-bottom: 30px;
      opacity: 1;
      transform: translateY(20px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    .show {
      opacity: 1;
      transform: translateY(0);
    }

    .hide {
      opacity: 0;
      transform: translateY(-20px);
    }

    /* Boutons */
    .actions {
      display: flex;
      gap: 15px;
      justify-content: center;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    .actions.show {
      opacity: 1;
      transform: translateY(0);
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #6c5ce7;
      color: white;
      font-size: 14px;
    }

    button:hover {
      background: #4834d4;
    }
  </style>
</head>

<body>

  <div class="container">
    <div id="texte"></div>

    <div id="actions" class="actions">
      <button onclick="voirProfil()">Voir mon profil</button>
      <button onclick="changerDestin()">Changer de destin</button>
    </div>
  </div>

  <script>
    const phrases = [
      "Lorem ipsum dolor sit amet...",
      "Consectetur adipiscing elit...",
      "Sed do eiusmod tempor incididunt...",
      "Le destin se révèle..."
    ];

    const tempsAffichage = 3000;
    const tempsTransition = 800;
    const pause = 1200;

    function attendre(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function animation() {
      console.log("Lancement de l'animation du tirage du destin...");
      const el = document.getElementById("texte");
      const actions = document.getElementById("actions");

      await attendre(1000); // petit délai avant

      for (let phrase of phrases) {

        el.innerHTML = phrase;

        el.className = ""; // reset classes
        void el.offsetWidth;

        // apparition
        el.classList.add("show");
        await attendre(tempsAffichage);

        // disparition
        el.classList.remove("show");
        el.classList.add("hide");
        await attendre(tempsTransition);

        // trou
        el.innerHTML = "";
        await attendre(pause);
      }

      // 🔥 Révélation finale
      el.innerHTML = "🔥 TON THÈME : Soirée Mythologie 🔥";

      el.classList.remove("hide");
      void el.offsetWidth;
      el.classList.add("show");

      // ⏱️ petit délai avant boutons
      await attendre(1500);

      // apparition des boutons
      actions.classList.add("show");
    }

    function voirProfil() {
      alert("Redirection vers le profil 🔮");
    }

    function changerDestin() {
      location.reload(); // simple reset
    }

    window.onload = animation;
  </script>

</body>
</html>
