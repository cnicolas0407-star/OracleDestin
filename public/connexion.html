<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="utf-8" />
        <title>Connexion</title>
        <link rel="stylesheet" href="/css/normalize.css" />
        <link rel="stylesheet" href="/css/nb.css" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
        <meta name="theme-Color" content="050510" />   
        <!--<script src=""></script>
        <script src=""></script> Ici les liens js -->
    </head>
    <body>
        <h2 class="texte">Connexion à l'âme </h2>
        <p id="messageRetour" class="message-retour" aria-live="polite"></p>

        <form id="formConnexion" class="formContainer" novalidate>
            <input 
            type="email" 
            id="email" 
            placeholder="Email" 
            autocomplete="email" />
        <p class="erreur-champ" id="errEmail"></p>

            <input 
            type="password" 
            id="motDePasse" 
            name="motDePasse" 
            placeholder="Mot de passe" 
            autocomplete="current-password" 
            required>
        <p class="erreur-champ" id="errMdp"></p>

            <button type="submit" id="btnConnecter" > Connexion</button>
        </form>
        <div>
            <a href="Inscription.html"><button> Pas encore inscrit ?</button></a>
        </div> 
        

        <script src="/js/connexion.js"></script>

    </body>
</html>
